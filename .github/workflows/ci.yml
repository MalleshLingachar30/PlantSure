name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: plantsure_test
          POSTGRES_USER: plantsure
          POSTGRES_PASSWORD: plantsure
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plantsure -d plantsure_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://plantsure:plantsure@localhost:5432/plantsure_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check
